<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Centrifuge Volleyball</title>
        <meta name="description" content="A two-player game on a rotating cylinder in space." />
        <meta name="theme-color" content="#1d1e20" />
        <link rel="manifest" href="manifest.json" />
        <link rel="apple-touch-icon" href="assets/icon-192.png" />
        <link rel="stylesheet" href="styles/styles.css" />
    </head>
    <body>
        <div id="wrapper">
            <!-- Mobile: P2 controls sit at the top, rotated so the top player can read them -->
            <div id="touch-p2" class="touch-zone">
                <button class="touch-btn" data-player="2" data-action="left"><</button>
                <button class="touch-btn touch-jump" data-player="2" data-action="jump">P2</button>
                <button class="touch-btn" data-player="2" data-action="right">></button>
            </div>

            <header>
                <h1>Centrifuge Volleyball</h1>
                <p>First to 25, win by 2</p>
            </header>

            <div id="game-container">
                <canvas id="canv" width="637" height="637">
                    Your browser does not support the HTML5 canvas tag.
                </canvas>
                <div id="fps-counter"><span id="fps">0</span> fps</div>
            </div>

            <div id="controls">
                <div class="player-controls" data-player="1">
                    <span class="player-label">P1</span>
                    <kbd>←</kbd><kbd>→</kbd>
                    <kbd>↑</kbd>
                </div>
                <div class="controls-divider"></div>
                <div class="player-controls" data-player="2">
                    <span class="player-label">P2</span>
                    <kbd>A</kbd><kbd>D</kbd>
                    <kbd>W</kbd>
                </div>
                <div class="controls-divider diff-ui" style="display: none;"></div>
                <div class="player-controls diff-ui" style="display: none;">
                    <span class="player-label">AI</span>
                    <span id="ai-difficulty" style="font-weight: 700; font-size: 0.75rem; letter-spacing: 0.04em;"></span>
                </div>
            </div>

            <!-- Mobile: P1 controls sit at the bottom -->
            <div id="touch-p1" class="touch-zone">
                <button class="touch-btn" data-player="1" data-action="left"><</button>
                <button class="touch-btn touch-jump" data-player="1" data-action="jump">P1</button>
                <button class="touch-btn" data-player="1" data-action="right">></button>
            </div>
        </div>

        <audio id="hitSound" preload="auto">
            <source src="assets/hit.ogg" type="audio/ogg" />
            <source src="assets/hit.mp3" type="audio/mpeg" />
        </audio>
        <audio id="oopsSound" preload="auto">
            <source src="assets/oops.ogg" type="audio/ogg" />
            <source src="assets/oops.mp3" type="audio/mpeg" />
        </audio>
        <audio id="winSound" preload="auto">
            <source src="assets/win.ogg" type="audio/ogg" />
            <source src="assets/win.mp3" type="audio/mpeg" />
        </audio>

        <script type="module" src="js/Game.js"></script>
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js').catch((err) => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
                });
            }
        </script>
    </body>
</html>
